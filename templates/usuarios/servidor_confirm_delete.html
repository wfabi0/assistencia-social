{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0">Confirmar Exclusão</h4>
        </div>
        <div class="card-body">
            <p class="card-text">
                Tem certeza que deseja excluir o servidor <strong>{{ object.nome }}</strong> (SIAPE: {{ object.siape }})? 
            </p>
            <p class="text-muted">Esta ação não poderá ser desfeita.</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-danger">Sim, Excluir</button>
                    <a href="{% url 'servidor_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
