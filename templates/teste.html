<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Acadêmico</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <!-- Cabeçalho -->
    <header class="header">
        <div class="logo">
            Sistema Acadêmico
        </div>

        <div class="usuario-logado">
            {{ request.user.username }}
        </div>
    </header>

    <!-- Menu -->
    <nav class="navbar">
        <ul>

            <li class="dropdown">
                <a href="#">Usuários ▼</a>
                <ul class="dropdown-content">
                    <li><a href="/alunos/">Alunos</a></li>
                    <li><a href="/servidores/">Servidores</a></li>
                </ul>
            </li>

            <li>
                <a href="/atendimentos/">Atendimentos</a>
            </li>

            <li class="dropdown">
                <a href="#">Relatórios ▼</a>
                <ul class="dropdown-content">
                    <li><a href="/relatorio/alunos/">Alunos</a></li>
                    <li><a href="/relatorio/atendimentos/">Atendimentos</a></li>
                </ul>
            </li>

            <li class="dropdown usuario-menu">
                <a href="#">{{ request.user.username }} ▼</a>
                <ul class="dropdown-content">
                    <li><a href="/logout/">Sair</a></li>
                </ul>
            </li>

        </ul>
    </nav>

    <!-- Breadcrumb -->
    <section class="breadcrumb">
        {% block breadcrumb %}
        Home
        {% endblock %}
    </section>

    <!-- Conteúdo -->
    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
