<div id="{{ modal_id }}" style="display:none;">
    <div id="{{ modal_id }}-conteudo">
        <div id="{{ modal_id }}-header">
            <h3>{{ titulo }}</h3>
        </div>
        <div id="{{ modal_id }}-body">
            <p id="{{ modal_id }}-mensagem"></p>
            <p id="{{ modal_id }}-aviso"><strong>Atenção:</strong> Esta ação não poderá ser desfeita.</p>
            <form method="post" id="{{ modal_id }}-form">
                {% csrf_token %}
                <button type="submit">{{ btn_confirmar|default:"Confirmar" }}</button>
                <button type="button" onclick="fecharModal('{{ modal_id }}')">{{ btn_cancelar|default:"Cancelar" }}</button>
            </form>
        </div>
    </div>
</div>

<style>
    #{{ modal_id }} {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
    }

    #{{ modal_id }}-conteudo {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        border-radius: 8px;
        min-width: 340px;
        max-width: 500px;
        overflow: hidden;
    }

    #{{ modal_id }}-header {
        background-color: #c0392b;
        padding: 14px 20px;
    }

    #{{ modal_id }}-header h3 {
        color: white;
        margin: 0;
        font-size: 1.1rem;
    }

    #{{ modal_id }}-body {
        padding: 20px;
    }

    #{{ modal_id }}-mensagem {
        margin-bottom: 8px;
        color: #333;
    }

    #{{ modal_id }}-aviso {
        color: #2980b9;
        font-size: 0.875rem;
        margin-bottom: 20px;
    }

    #{{ modal_id }}-form {
        display: flex;
        gap: 8px;
    }

    #{{ modal_id }}-form button[type="submit"] {
        background-color: #c0392b;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
    }

    #{{ modal_id }}-form button[type="button"] {
        background-color: white;
        color: #333;
        border: 1px solid #ccc;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
    }
</style>

<script>
    function abrirModal(modalId, url, mensagem) {  
        document.getElementById(modalId + '-mensagem').innerHTML = mensagem;
        document.getElementById(modalId + '-form').action = url;
        document.getElementById(modalId).style.display = 'block';
    }

    function fecharModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    document.getElementById('{{ modal_id }}').addEventListener('click', function(e) {
        if (e.target === this) fecharModal('{{ modal_id }}');
    });

    document.querySelectorAll('[data-modal]').forEach(btn => {
        btn.addEventListener('click', function() {
            abrirModal(
                this.dataset.modal,
                this.dataset.url,
                this.dataset.mensagem
            );
        });
    });
</script>
